  /customs/transits/movements/departures/{departureId}/messages:
    get:
      tags:
        - Departures
      summary: Get all cached messages related to a departure
      description: |
        Get all messages related to a specific departure declaration sent to the customs office of departure within the past 60 days.
        You can filter for departure declarations received before and/or after a specific date and time.
        Movements older than 60 days are archived, so any messages to related to them cannot be returned by the API.
        For a multi-page query you can filter for a specific page, and optionally the number of items per page.
        A successful response will include the total count of the number of messages and Movement Reference Number (MRN) only after it has been allocated to a movement. <br/><br/> The `status` parameter in a successful response can have the following values:

         - `Pending`: the file has not yet been uploaded or checks are not yet completed
         - `Processing`: the file has been received by us and the message is being processed
         - `Success`: the file has been processed successfully
         - `Failed`: there was a problem with the file and the message was not processed

        **Note:** You can view a transit movement only if your Economic Operators Registration and Identification (EORI) number matches the EORI number that created the transit declaration for that movement.  Your EORI number is part of the bearer token that you use for API authentication.
      operationId: getAllCachedMessagesRelatedToDeparture
      parameters:
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - in: path
          name: departureId
          description: The departure ID specifying the departure to return.
          required: true
          style: simple
          schema:
            type: string
        - in: query
          name: receivedSince
          description: This is an optional query parameter that you can use to filter for departure declarations received after a specific date and time.
          style: form
          schema:
            type: string
            format: date-time
            example: '2021-06-21T09:00:00Z'
        - in: query
          name: page
          description: |
            This is an optional query parameter (default value is `1`) that allows the selection of a specific page from a multi-page query.  If used, you must enter a positive number.
          style: form
          schema:
            type: integer
            example: 2
        - in: query
          name: count
          description: |
            This is an optional query parameter (default value is `25`) that you can use to select the number of items per page in a multi-page query. If used, you must enter a positive number. The maximum value allowed is `500`.
          style: form
          schema:
            type: integer
            example: 50
        - in: query
          name: receivedUntil
          description: This is an optional query parameter that you can use to filter for arrivals updated before a specific date and time.
          style: form
          schema:
            type: string
            format: date-time
            example: '2023-06-15T09:00:00Z'
      responses:
        '200':
          description: A successful get all messages related to departure response
          content:
            application/json:
              schema:
                title: CustomsTransitsMovementsDeparturesMessagesResponse
                required: &ref_60
                  - _links
                  - totalCount
                  - messages
                type: object
                properties: &ref_61
                  _links:
                    title: Links2
                    required: &ref_11
                      - self
                      - departure
                    type: object
                    properties: &ref_12
                      self:
                        title: Self
                        required: *ref_4
                        type: object
                        properties: *ref_5
                        example: *ref_6
                      departure:
                        title: Departure1
                        required:
                          - href
                        type: object
                        properties:
                          href:
                            type: string
                        example:
                          href: /customs/transits/movements/departures/6365135ba5e821ee
                    example: &ref_13
                      self:
                        href: /customs/transits/movements/departures/6365135ba5e821ee/messages
                      departure:
                        href: /customs/transits/movements/departures/6365135ba5e821ee
                  totalCount:
                    type: number
                  messages:
                    type: array
                    items:
                      title: Messages2
                      required: &ref_84
                        - _links
                        - id
                        - departureId
                        - received
                        - status
                      type: object
                      properties: &ref_85
                        _links:
                          title: Links2
                          required: *ref_11
                          type: object
                          properties: *ref_12
                          example: *ref_13
                        id:
                          type: string
                        departureId:
                          type: string
                        received:
                          type: string
                        type:
                          type: string
                        status:
                          type: string
                      example: &ref_86
                        _links:
                          self:
                            href: /customs/transits/movements/departures/6365135ba5e821ee/message/634982098f02f00a
                          departure:
                            href: /customs/transits/movements/departures/6365135ba5e821ee
                        id: 634982098f02f00a
                        departureId: 6365135ba5e821ee
                        received: '2022-11-10T15:32:51.459Z'
                        type: IE015
                        status: Success
                    description: ''
                example: &ref_62
                  _links:
                    self:
                      href: /customs/transits/movements/departures/6365135ba5e821ee/messages
                    departure:
                      href: /customs/transits/movements/departures/6365135ba5e821ee
                  totalCount: 1
                  messages:
