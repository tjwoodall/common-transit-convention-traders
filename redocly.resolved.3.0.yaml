  /customs/transits/movements/arrivals/{arrivalId}/messages/{messageId}/body:
    get:
      tags:
        - Arrivals
      summary: Get the body of a cached message related to an arrival and message ID
      description: |
        Get the body of the message related to a specific arrival and message ID that have been received within the past 60 days.
        For example, this could include messages about route diversions or unloading permissions.
        Movements older than 60 days and their related messages are archived and cannot be returned by the API. <br/><br/> The response can be returned in the following format based on the provided `Accept` header:

         - `application/vnd.hmrc.3.0+xml`: XML, where the message is provided without any other metadata.
         - `application/vnd.hmrc.3.0+json`: JSON, where the message is provided without any other metadata.

        **Note:** You can view a transit movement only if your Economic Operators Registration and Identification (EORI) number matches the EORI number that created the transit declaration for that movement. Your EORI number is part of the bearer token that you use for API authentication.\n
      operationId: getMessageBodyRelatedToArrivalAndMessageID
      parameters:
        - name: Accept
          in: header
          description: 'Specifies the response format, which must be XML or JSON, and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used. Acceptable values are : `application/vnd.hmrc.3.0+xml` or `application/vnd.hmrc.3.0+json`.'
          required: true
          schema: *ref_35
        - in: path
          name: arrivalId
          description: The arrival ID specifying the departure to return.
          required: true
          style: simple
          schema:
            type: string
        - in: path
          name: messageId
          description: The message ID specifying the message to return.
          required: true
          style: simple
          schema:
            type: string
      responses:
        '200':
          description: A successful get message body related to arrival and message ID response
          content:
            application/xml:
              schema:
                title: XML payload
                type: string
                example: <ncts:CC007C PhaseID="NCTS6.0" xmlns:ncts="http://ncts.dgtaxud.ec">...</ncts:CC007C>
              example: <ncts:CC007C PhaseID="NCTS6.0" xmlns:ncts="http://ncts.dgtaxud.ec">...</ncts:CC007C>
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                title: NotFound
                description: Supplied arrival/departure not found in the database or does not exist.
                required: *ref_9
                type: object
                properties: *ref_10
              examples:
                MovementNotFound:
                  value:
                    code: NOT_FOUND
                    message: Arrival movement with ID abcdef0123456789 was not found
                MessageNotFound:
                  value:
                    code: NOT_FOUND
                    message: Message with ID fedcba9876543210 for movement abcdef0123456789 was not found
                BodyNotFound:
                  value:
                    code: NOT_FOUND
                    message: Body for message id abcdef0123456789 does not exist
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                allOf:
                  - title: AcceptHeaderInvalid
                    description: The `Accept` header was not set to `application/vnd.hmrc.3.0+json` or `application/vnd.hmrc.3.0+json-xml`.
                    required: *ref_7
                    type: object
                    properties: *ref_8
                  - description: The Accept header is missing or invalid.
                    example:
                      code: NOT_ACCEPTABLE
                      message: The Accept header is missing or invalid.
              example:
                code: NOT_ACCEPTABLE
                message: The Accept header is missing or invalid.
      security:
        - userRestricted:
            - common-transit-convention-traders
