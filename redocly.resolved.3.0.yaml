openapi: 3.0.3
info:
  title: CTC Traders API
  contact: {}
  version: '3.0'
  description: |
    # Overview
    Use the CTC Traders API to send departure and arrival movements to the New Computerised Transit System (NCTS)
    and to get messages sent from customs offices of departure and destination.
    <br/><br/>
    You can use this version of the API to send both small messages (up to 5MB in size) and large messages 
    (up to 8MB in size). The large messages capability applies only to POST endpoints. 
    Although you can use the large messages functionality of the API to send both large and small messages, 
    you cannot use the small messages functionality of the API to send large messages.
    <br/><br/>
    For a detailed overview of v3.0 of the API and information about how to send large messages, 
    see [CTC Traders API service guide](/guides/ctc-traders-service-guide/).
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
    variables: {}
paths:
  /customs/transits/movements/departures:
    post:
      tags:
        - Departures
      summary: Send a declaration data message
      description: |
        Send a transit declaration to the customs office of departure to notify it that you wish to carry out a transit operation.

        This request is also called an ‘Declaration Data’ E_DEC_DAT (IE015) message.
        <br/><br/>
        If you use this endpoint to send a small message (up to 5MB), a successful response:

        - will contain a URI, which you can use to get the message status
        - will contain the departure ID specifying the departure returned
        - can also include an optional box ID, which you can use to match this movement to any messages received from the Push Pull Notifications API

        If you use this endpoint to send a large message (up to 8MB), a successful response will include:

        - a URL and additional metadata that you must use when uploading your file
        - a message ID that allows you track the status of that specific message

        **Note:** If an Economic Operators Registration and Identification (EORI) number has not been assigned to you, an HTTP 403 Forbidden error is returned.
      operationId: postDeclarationDataMessage
      parameters:
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: &ref_3
            type: string
            enum:
              - application/vnd.hmrc.3.0+json
        - name: Content-Type
          in: header
          description: Specifies the format of the request body, which must be XML or JSON, using UTF-8 character encoding.
          schema: &ref_14
            type: string
            enum:
              - application/json
              - application/xml
          required: true
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                oneOf:
                  - title: Small message submission response
                    required: &ref_69
                      - _links
                      - departureId
                      - messageId
                    type: object
                    properties: &ref_70
                      _links:
                        title: Links
                        required: &ref_0
                          - self
                          - messages
                        type: object
                        properties: &ref_1
                          self:
                            title: Self
                            required: &ref_4
                              - href
                            type: object
                            properties: &ref_5
                              href:
                                type: string
                            example: &ref_6
                              href: /customs/transits/movements/departures/62fb8f33d233578e
                          messages:
                            title: Messages
                            required:
                              - href
                            type: object
                            properties:
                              href:
                                type: string
                            example:
                              href: /customs/transits/movements/departures/62fb8f33d233578e/messages
                        example: &ref_2
                          self:
                            href: /customs/transits/movements/departures/62fb8f33d233578e
                          messages:
                            href: /customs/transits/movements/departures/62fb8f33d233578e/messages
                      departureId:
                        type: string
                      messageId:
                        type: string
                      boxId:
                        type: string
                    example: &ref_71
                      _links:
                        self:
                          href: /customs/transits/movements/departures/62fb8f33d233578e
                        messages:
                          href: /customs/transits/movements/departures/62fb8f33d233578e/messages
                        message:
                          href: /customs/transits/movements/departures/62fb8f33d233578e/messages/64fed8accac1fdc4
                      departureId: 62fb8f33d233578e
                      messageId: 64fed8accac1fdc4
                      boxId: b54c2424-955b-496c-bbce-dfb9f57cd797
                  - title: Large message (empty payload) response
                    required: &ref_72
                      - _links
                      - departureId
                      - messageId
                      - uploadRequest
                    type: object
                    properties: &ref_73
                      _links:
                        title: Links
                        required: *ref_0
                        type: object
                        properties: *ref_1
                        example: *ref_2
                      departureId:
                        type: string
                      messageId:
                        type: string
                      boxId:
                        type: string
                      uploadRequest:
                        title: Upload Details
                        required: &ref_15
                          - href
                          - fields
                        type: object
                        additionalProperties: false
                        properties: &ref_16
                          href:
                            type: string
                          fields:
                            type: object
                            additionalProperties: true
                        example: &ref_17
                          href: https://hmrc.gov.uk/upscan/upload-proxy
                          fields:
                            field_a: value a
                            field_b: value b
                    example: &ref_74
                      _links:
                        self:
                          href: /customs/transits/movements/departures/62fb8f33d233578e
                        messages:
                          href: /customs/transits/movements/departures/62fb8f33d233578e/messages
                        message:
                          href: /customs/transits/movements/departures/62fb8f33d233578e/messages/64fed8accac1fdc4
                      boxId: b54c2424-955b-496c-bbce-dfb9f57cd797
                      departureId: 62fb8f33d233578e
                      messageId: 64fed8accac1fdc4
                      uploadRequest:
                        href: https://hmrc.gov.uk/upscan/upload-proxy
                        fields:
                          field_a: value a
                          field_b: value b
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                allOf:
                  - title: BadRequest
                    description: An error in the supplied payload.
                    required: &ref_18
                      - code
                      - message
                    type: object
                    properties: &ref_19
                      code:
                        enum:
                          - BAD_REQUEST
                          - SCHEMA_VALIDATION
                          - BUSINESS_VALIDATION_ERROR
                        type: string
                      message:
                        type: string
                        description: The description of the error.
                  - example:
                      code: SCHEMA_VALIDATION
                      message: Request failed schema validation
              example:
                code: SCHEMA_VALIDATION
                message: Request failed schema validation
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                allOf:
                  - title: AcceptHeaderInvalid
                    description: The `Accept` header was not set to `application/vnd.hmrc.3.0+json` or `application/vnd.hmrc.3.0+json-xml`.
                    required: &ref_7
                      - code
                      - message
                    type: object
                    properties: &ref_8
                      code:
                        enum:
                          - NOT_ACCEPTABLE
                        type: string
                      message:
                        type: string
                        description: The description of the error.
                  - description: The Accept header is missing or invalid.
                    example:
                      code: NOT_ACCEPTABLE
                      message: The Accept header is missing or invalid.
              example:
                code: NOT_ACCEPTABLE
                message: The Accept header is missing or invalid.
        '413':
          description: Payload Too Large
          content:
            application/json:
              schema:
                allOf:
                  - title: RequestEntityTooLarge
                    description: The request body is too large.
                    required: &ref_20
                      - code
                      - message
                    type: object
                    properties: &ref_21
                      code:
                        enum:
                          - REQUEST_ENTITY_TOO_LARGE
                        type: string
                      message:
                        type: string
                        description: The description of the error.
                  - example:
                      code: REQUEST_ENTITY_TOO_LARGE
                      message: Request Entity Too Large
              example:
                code: REQUEST_ENTITY_TOO_LARGE
                message: Request Entity Too Large
      security:
        - userRestricted:
            - common-transit-convention-traders
    get:
      tags:
        - Departures
      summary: Get all cached departures
      description: |
        Get all departure declarations sent to the customs office of departure within the past 60 days.
        You can filter for departure declarations updated before and/or after a specific date and time, and optionally filter for departure declarations with a specific EORI.
        For a multi-page query you can filter for a specific page, and optionally the number of items per page.
        Movements older than 60 days and their related messages are archived and cannot be returned by the API.
        A successful response will include the total count of the number of movements and a Movement Reference Number (MRN) only after it has been allocated to a movement. <br/><br/> **Note:** You can view a transit movement only if your Economic Operators Registration and Identification (EORI) number matches the EORI number that created the transit declaration for that movement.  Your EORI number is part of the bearer token that you use for API authentication.
      operationId: getAllCachedDepartures
      parameters:
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - in: query
          name: updatedSince
          description: This is an optional query parameter that you can use to filter for departure declarations updated after a specific date and time.
          style: form
          schema:
            type: string
            format: date-time
            example: '2021-06-21T09:00:00Z'
        - in: query
          name: movementEORI
          description: This is an optional query parameter that you can use to filter for departure declarations that were submitted with a specified movement EORI.
          style: form
          schema:
            type: string
            example: GB1234567890
        - in: query
          name: movementReferenceNumber
          description: This is an optional query parameter that allows a list of departures to be filtered by an MRN.
          style: form
          schema:
            type: string
            example: 27WF9X1FQ9RCKN0TM3
        - in: query
          name: localReferenceNumber
          description: This is an optional query parameter that allows a list of departures to be filtered by an LRN.
          style: form
          schema:
            type: string
            example: 3CnsTh79I7vtOy6
        - in: query
          name: page
          description: |
            This is an optional query parameter (default value is `1`) that allows the selection of a specific page from a multi-page query.  If used, you must enter a positive number.
          style: form
          schema:
            type: integer
            example: 2
        - in: query
          name: count
          description: |
            This is an optional query parameter (default value is `25`) that you can use to select the number of items per page in a multi-page query. If used, you must enter a positive number. The maximum value allowed is `500`.
          style: form
          schema:
            type: integer
            example: 50
        - in: query
          name: receivedUntil
          description: This is an optional query parameter that you can use to filter for departure declarations updated before a specific date and time.
          style: form
          schema:
            type: string
            format: date-time
            example: '2023-06-15T09:00:00Z'
      responses:
        '200':
          description: A successful get all departures response
          content:
            application/json:
              schema:
                title: CustomsTransitsMovementsDeparturesResponse2
                required: &ref_78
                  - _links
                  - departures
                  - totalCount
                type: object
                properties: &ref_79
                  _links:
                    title: Links7
                    required: &ref_25
                      - self
                    type: object
                    properties: &ref_26
                      self:
                        title: Self
                        required: *ref_4
                        type: object
                        properties: *ref_5
                        example: *ref_6
                    example: &ref_27
                      self:
                        href: /customs/transits/movements/arrivals
                  totalCount:
                    type: number
                    description: Number of movements returned by the filter
                  departures:
                    type: array
                    items:
                      title: Departure
                      required: &ref_81
                        - _links
                        - id
                        - created
                        - enrollmentEORINumber
                      type: object
                      properties: &ref_82
                        _links:
                          title: Links
                          required: *ref_0
                          type: object
                          properties: *ref_1
                          example: *ref_2
                        id:
                          type: string
                        movementReferenceNumber:
                          type: string
                        localReferenceNumber:
                          type: string
                        created:
                          type: string
                        updated:
                          type: string
                        enrollmentEORINumber:
                          type: string
                        movementEORINumber:
                          type: string
                      example: &ref_83
                        _links:
                          self:
                            href: /customs/transits/movements/departures/6365135ba5e821ee
                          messages:
                            href: /customs/transits/movements/departures/6365135ba5e821ee/messages
                        id: 63651574c3447b12
                        movementReferenceNumber: 27WF9X1FQ9RCKN0TM3
                        localReferenceNumber: DEF456
                        created: '2022-11-04T13:36:52.332Z'
                        updated: '2022-11-04T13:36:52.332Z'
                        enrollmentEORINumber: '9999912345'
                        movementEORINumber: GB1234567890
                    description: ''
                example: &ref_80
                  _links:
                    self:
                      href: /customs/transits/movements/departures
                  totalCount: 1
                  departures:
                    - _links:
                        self:
                          href: /customs/transits/movements/departures/63651574c3447b12
                        messages:
                          href: /customs/transits/movements/departures/63651574c3447b12/messages
                      id: 63651574c3447b12
                      movementReferenceNumber: 27WF9X1FQ9RCKN0TM3
                      created: '2022-11-04T13:36:52.332Z'
                      updated: '2022-11-04T13:36:52.332Z'
                      enrollmentEORINumber: '9999912345'
                      movementEORINumber: GB1234567890
                    - _links:
                        self:
                          href: /customs/transits/movements/departures/6365135ba5e821ee
                        messages:
                          href: /customs/transits/movements/departures/6365135ba5e821ee/messages
                      id: 6365135ba5e821ee
                      movementReferenceNumber: 27WF9X1FQ9RCKN0TM3
                      created: '2022-11-04T13:27:55.522Z'
                      updated: '2022-11-04T13:27:55.522Z'
                      enrollmentEORINumber: '9999912345'
                      movementEORINumber: GB1234567890
              example:
                _links:
                  self:
                    href: /customs/transits/movements/departures
                totalCount: 1
                departures:
                  - _links:
                      self:
                        href: /customs/transits/movements/departures/6365135ba5e821ee
                      messages:
                        href: /customs/transits/movements/departures/6365135ba5e821ee/messages
                    id: 6365135ba5e821ee
                    movementReferenceNumber: ABC123
                    localReferenceNumber: DEF456
                    created: '2022-11-10T15:32:51.459Z'
                    updated: '2022-11-10T15:32:51.459Z'
                    enrollmentEORINumber: GB1234567890
                    movementEORINumber: GB1234567890
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                title: NotFound
                description: Supplied arrival/departure not found in the database or does not exist.
                required: &ref_9
                  - code
                  - message
                type: object
                properties: &ref_10
                  code:
                    enum:
                      - NOT_FOUND
                    type: string
                  message:
                    type: string
                    description: The description of the error.
              example:
                code: NOT_FOUND
                message: The requested page does not exist
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                allOf:
                  - title: AcceptHeaderInvalid
                    description: The `Accept` header was not set to `application/vnd.hmrc.3.0+json` or `application/vnd.hmrc.3.0+json-xml`.
                    required: *ref_7
                    type: object
                    properties: *ref_8
                  - description: The Accept header is missing or invalid.
                    example:
                      code: NOT_ACCEPTABLE
                      message: The Accept header is missing or invalid.
              example:
                code: NOT_ACCEPTABLE
                message: The Accept header is missing or invalid.
      security:
        - userRestricted:
            - common-transit-convention-traders
