      operationId: getCachedDepartureForDepartureID
      parameters:
        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - in: path
          name: departureId
          description: The departure ID specifying the departure to return.
          required: true
          style: simple
          schema:
            type: string
      responses:
        '200':
          description: A successful get departure for departure ID response
          content:
            application/json:
              schema:
                title: CustomsTransitsMovementsDeparturesResponse1
