        - name: Accept
          in: header
          description: Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning) of the API to be used.
          required: true
          schema: *ref_3
        - name: updatedSince
          in: query
          description: This is an optional query parameter that you can use to filter for arrivals updated after a specific date and time.
          style: form
          schema:
            type: string
            format: date-time
            example: '2021-06-21T09:00:00Z'
        - name: movementEORI
          in: query
          description: This is an optional query parameter that you can use to filter for arrivals that were submitted with a specified movement EORI.
          style: form
          schema:
            type: string
            example: GB1234567890
        - in: query
          name: movementReferenceNumber
          description: This is an optional query parameter that allows a list of arrivals to be filtered by an MRN.
          style: form
          schema:
            type: string
            example: 27WF9X1FQ9RCKN0TM3
        - in: query
          name: localReferenceNumber
          description: This is an optional query parameter that allows a list of arrivals to be filtered by an LRN.
          style: form
          schema:
            type: string
            example: 3CnsTh79I7vtOy6
        - in: query
          name: page
          description: |
            This is an optional query parameter (default value is `1`) that allows the selection of a specific page from a multi-page query.  If used, you must enter a positive number.
          style: form
          schema:
            type: integer
            example: 2
        - in: query
          name: count
          description: |
            This is an optional query parameter (default value is `25`) that you can use to select the number of items per page in a multi-page query. If used, you must enter a positive number. The maximum value allowed is `500`.
          style: form
          schema:
            type: integer
            example: 50
        - in: query
          name: receivedUntil
          description: This is an optional query parameter that you can use to filter for arrivals updated before a specific date and time.
          style: form
          schema:
            type: string
